name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-smoke:
    name: Lint + import smoke test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff (non-blocking)
        run: ruff check src scripts || true

      - name: Import smoke test
        run: |
          python -c "import sys; sys.path.insert(0, 'src'); import phm; print('phm package imports OK')"
          python -c "import sys; sys.path.insert(0, 'src'); from phm.modeling import all_baseline_models; print('models:', list(all_baseline_models().keys()))"

  pipeline-artifacts:
    name: Build presentation artifacts
    runs-on: ubuntu-latest
    needs: lint-and-smoke
    # Only on push to main (avoid heavy work on every PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rebuild presentations from tracked CSVs + figures
        run: |
          python scripts/build_pipeline_presentation.py
          python scripts/build_pipeline_presentation_en.py

      - name: Upload PPTX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: presentations
          path: outputs/reports/*.pptx
          retention-days: 30

      - name: Upload tracked metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics/layered_pipeline/*.csv
          retention-days: 30
